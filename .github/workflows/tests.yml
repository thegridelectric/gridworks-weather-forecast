name: Tests

on:
  - push
  - pull_request

jobs:
  lint:
    name: lint / 3.12
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-groups --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  tests:
    name: tests / ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    env:
      FORCE_COLOR: "1"
    services:
      # Same baked multi-arch image as gridworks-base's dev broker
      # (gridworks-base/arm.sh / x86.sh) and gridworks-base's own CI, so
      # this repo runs against the exact RabbitMQ + topology developers use.
      # The image bakes the conf + generated definitions (vhost d1__1,
      # smqPublic, the exchanges/bindings from gwbase.topology).
      rabbit:
        image: ghcr.io/thegridelectric/dev-rabbit:latest
        ports:
          - 5672:5672
          - 15672:15672
          - 1885:1885
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - run: uv sync --all-groups --locked

      - name: Run tests
        run: uv run pytest
